apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: thunder-dev


# Image is managed by build.sh via: kustomize edit set image
# Do not edit manually.
images:
- name: thunder-web
  newName: localhost:30500/thunder-web
  newTag: 6df863c


  # Expose as NodePort for direct local access

  # Use Traefik ingress (k3s built-in)
patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: NODE_ENV
        value: development
    - op: replace
      path: /spec/template/spec/containers/0/imagePullPolicy
      value: Always
  target:
    kind: Deployment
    name: thunder-web
- patch: |-
    - op: replace
      path: /spec/type
      value: NodePort
    - op: add
      path: /spec/ports/0/nodePort
      value: 30001
  target:
    kind: Service
    name: thunder-web
- patch: |-
    - op: replace
      path: /spec/ingressClassName
      value: traefik
  target:
    kind: Ingress
    name: thunder-ingress
- patch: |-
    - op: replace
      path: /spec/jobTemplate/spec/template/spec/containers/0/imagePullPolicy
      value: Always
  target:
    kind: CronJob
    name: wallet-reconcile

      # Redis in-cluster (2A-21) — WALLET_PROVIDER=redis enables Redis-first wallet
secretGenerator:
- literals:
  - SUPABASE_URL=http://supabase-supabase-kong.thunder-dev:8000
  - SUPABASE_SERVICE_ROLE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaXNzIjoic3VwYWJhc2UiLCJpYXQiOjE2NDE3NjkyMDAsImV4cCI6MTc5OTUzNTYwMH0.ywbHA4mc8iwfpziFbKDMxj6K9HsJ5x3Y_34-PA8vQm8
  - JWT_SECRET=dev-jwt-secret-min-32-chars-long-here
  - ALLOWED_ORIGIN=*
  - REDIS_URL=redis://thunder-redis.thunder-dev:6379
  - WALLET_PROVIDER=supabase
  name: thunder-secrets
  options:
    disableNameSuffixHash: true
resources:
- ../../base
