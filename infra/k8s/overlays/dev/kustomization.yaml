apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: thunder-dev

bases:
  - ../../base

# Image is managed by build.sh via: kustomize edit set image
# Do not edit manually.
images:
  - name: thunder-web
    newName: localhost:30500/thunder-web
    newTag: v3

patches:
  - target:
      kind: Deployment
      name: thunder-web
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: NODE_ENV
          value: development

  # Expose as NodePort for direct local access
  - target:
      kind: Service
      name: thunder-web
    patch: |-
      - op: replace
        path: /spec/type
        value: NodePort
      - op: add
        path: /spec/ports/0/nodePort
        value: 30001

  # Use Traefik ingress (k3s built-in)
  - target:
      kind: Ingress
      name: thunder-ingress
    patch: |-
      - op: replace
        path: /spec/ingressClassName
        value: traefik

secretGenerator:
  - name: thunder-secrets
    literals:
      - SUPABASE_URL=http://supabase-supabase-kong.thunder-dev:8000
      - SUPABASE_SERVICE_ROLE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyAgCiAgICAicm9sZSI6ICJzZXJ2aWNlX3JvbGUiLAogICAgImlzcyI6ICJzdXBhYmFzZS1kZW1vIiwKICAgICJpYXQiOiAxNjQxNzY5MjAwLAogICAgImV4cCI6IDE3OTk1MzU2MDAKfQ.DaYlNEoUrrEn2Ig7tqibS-PHK5vgusbcbo7X36XVt4Q
      - JWT_SECRET=dev-jwt-secret-min-32-chars-long-here
    options:
      disableNameSuffixHash: true
