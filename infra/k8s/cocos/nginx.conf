server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # index.html: never cache — ensures users always get latest JS references
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Cocos Creator web-desktop: serve assets with correct MIME types
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|mjs)$ {
        add_header Content-Type application/javascript;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    location ~* \.(wasm)$ {
        add_header Content-Type application/wasm;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    location /assets/ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    gzip on;
    gzip_types text/plain application/javascript application/json application/wasm;
}
