apiVersion: apps/v1
kind: Deployment
metadata:
  name: thunder-cocos
  namespace: thunder-dev
  labels:
    app: thunder-cocos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: thunder-cocos
  template:
    metadata:
      labels:
        app: thunder-cocos
    spec:
      containers:
        - name: cocos
          image: thunder-cocos:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /index.html
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: thunder-cocos
  namespace: thunder-dev
spec:
  selector:
    app: thunder-cocos
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
