apiVersion: apps/v1
kind: Deployment
metadata:
  name: thunder-web
  labels:
    app: thunder-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: thunder-web
  template:
    metadata:
      labels:
        app: thunder-web
    spec:
      # S-18: Run as non-root user
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: web
          image: thunder-web:latest
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
          envFrom:
            - secretRef:
                name: thunder-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: thunder-web
spec:
  selector:
    app: thunder-web
  ports:
    - port: 80
      targetPort: 3001
  type: ClusterIP
