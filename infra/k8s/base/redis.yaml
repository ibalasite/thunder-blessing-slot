---
# Redis ConfigMap — AOF enabled for durability (2A-21)
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
data:
  redis.conf: |
    appendonly yes
    appendfsync everysec
    auto-aof-rewrite-percentage 100
    auto-aof-rewrite-min-size 64mb
    maxmemory 256mb
    maxmemory-policy allkeys-lru
    save 900 1
    save 300 10
    save 60 10000

---
# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: thunder-redis
  labels:
    app: thunder-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: thunder-redis
  template:
    metadata:
      labels:
        app: thunder-redis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
        - name: redis
          image: redis:7.2-alpine
          command: ["redis-server", "/etc/redis/redis.conf"]
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-config
              mountPath: /etc/redis
            - name: redis-data
              mountPath: /data
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "384Mi"
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: redis-config
          configMap:
            name: redis-config
        - name: redis-data
          emptyDir: {}

---
# Redis Service (ClusterIP — internal only)
apiVersion: v1
kind: Service
metadata:
  name: thunder-redis
spec:
  selector:
    app: thunder-redis
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP
