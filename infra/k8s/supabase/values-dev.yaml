# ── Disable everything we don't need ──────────────────
deployment:
  analytics:
    enabled: false
  vector:
    enabled: false
  functions:
    enabled: false
  imgproxy:
    enabled: false
  realtime:
    enabled: false
  storage:
    enabled: false
  studio:
    enabled: false
  minio:
    enabled: false

  # Keep these ↓
  db:
    enabled: true
    replicaCount: 1
  auth:
    enabled: true
    replicaCount: 1
  rest:
    enabled: true
    replicaCount: 1
  meta:
    enabled: true
    replicaCount: 1
  kong:
    enabled: true
    replicaCount: 1

# ── Persistence: use small PVC for dev ────────────────
persistence:
  db:
    enabled: true
    storageClassName: "local-path"
    size: 2Gi

# ── Expose Kong as NodePort so we can reach it ────────
service:
  kong:
    type: NodePort
    port: 8000
    nodePort: 30000

# ── GoTrue / Auth settings ────────────────────────────
environment:
  auth:
    GOTRUE_SITE_URL: "http://localhost:3001"
    GOTRUE_URI_ALLOW_LIST: "*"
    GOTRUE_DISABLE_SIGNUP: "false"
    GOTRUE_JWT_EXPIRY: "3600"
    GOTRUE_SMTP_ADMIN_EMAIL: "admin@thunder.local"
    GOTRUE_MAILER_AUTOCONFIRM: "true"
    GOTRUE_LOG_LEVEL: "DEBUG"
