apiVersion: v1
kind: ConfigMap
metadata:
  name: supabase-migrations
  namespace: thunder-dev
data:
  run.sh: |
    #!/bin/sh
    set -e
    echo "Waiting for PostgreSQL to be ready..."
    until pg_isready -h supabase-supabase-db.thunder-dev -p 5432 -U postgres; do
      sleep 2
    done
    echo "PostgreSQL is ready. Running migrations..."
    for f in $(ls /migrations/*.sql 2>/dev/null | sort); do
      echo "  → $f"
      psql -h supabase-supabase-db.thunder-dev -p 5432 -U postgres -d postgres -f "$f"
    done
    echo "All migrations completed."
---
# Note: supabase-sql-migrations ConfigMap is created by start-dev.sh via:
#   kubectl create configmap supabase-sql-migrations --from-file=... | kubectl apply -f -
# It is NOT defined here so that kubectl apply -f migration-job.yaml never resets it
# to empty data:{} and erases the SQL files loaded by the script.
apiVersion: batch/v1
kind: Job
metadata:
  name: supabase-migrate
  namespace: thunder-dev
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: postgres:15-alpine
          command: ["/bin/sh", "/scripts/run.sh"]
          env:
            - name: PGPASSWORD
              value: "devpostgrespassword"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: migrations
              mountPath: /migrations
      volumes:
        - name: scripts
          configMap:
            name: supabase-migrations
            defaultMode: 0755
        - name: migrations
          configMap:
            name: supabase-sql-migrations
