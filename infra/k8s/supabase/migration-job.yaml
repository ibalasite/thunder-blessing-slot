apiVersion: v1
kind: ConfigMap
metadata:
  name: supabase-migrations
  namespace: thunder-dev
data:
  run.sh: |
    #!/bin/sh
    set -e
    echo "Waiting for PostgreSQL to be ready..."
    until pg_isready -h supabase-supabase-db.thunder-dev -p 5432 -U postgres; do
      sleep 2
    done
    echo "PostgreSQL is ready. Running migrations..."
    psql -h supabase-supabase-db.thunder-dev -p 5432 -U postgres -d postgres -f /migrations/initial_schema.sql
    echo "Migrations completed."
---
apiVersion: batch/v1
kind: Job
metadata:
  name: supabase-migrate
  namespace: thunder-dev
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: postgres:15-alpine
          command: ["/bin/sh", "/scripts/run.sh"]
          env:
            - name: PGPASSWORD
              value: "devpostgrespassword"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: migrations
              mountPath: /migrations
      volumes:
        - name: scripts
          configMap:
            name: supabase-migrations
            defaultMode: 0755
        - name: migrations
          configMap:
            name: supabase-sql-migrations
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: supabase-sql-migrations
  namespace: thunder-dev
binaryData: {}
