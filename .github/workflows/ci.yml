name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Game Engine Tests (existing Cocos project) ──
  game-tests:
    name: Game Engine Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
        working-directory: .

      - name: Unit + Integration tests (no RTP)
        run: npx jest --testPathIgnorePatterns="rtp|ThreeMode|ModeRTP|BetLevel" --no-coverage
        working-directory: .

  # ── Server Tests (Next.js apps/web) ──
  server-tests:
    name: Server Tests (100% coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --filter @thunder/web

      - name: Type check
        run: pnpm --filter @thunder/web type-check

      - name: Unit tests with coverage
        run: pnpm --filter @thunder/web test:unit
        env:
          NODE_ENV: test
          SUPABASE_URL: http://localhost:54321
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          JWT_SECRET: ci-test-jwt-secret-min-32-chars-ok

  # ── Type Check (root) ──
  type-check:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
