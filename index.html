<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>⚡ Thunder Blessing</title>
    <meta name="viewport" content="width=device-width,user-scalable=no,initial-scale=1,minimum-scale=1,maximum-scale=1,minimal-ui=true"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="mobile-web-app-capable" content="yes"/>
    <meta name="full-screen" content="yes"/>
    <meta name="screen-orientation" content="portrait"/>
    <meta name="x5-fullscreen" content="true"/>
    <meta name="360-fullscreen" content="true"/>
    <meta name="renderer" content="webkit"/>
    <meta name="force-rendering" content="webkit"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
    <link rel="stylesheet" type="text/css" href="./style.css"/>
    <link rel="icon" href="favicon.ico"/>
    <style>
      html, body { margin:0; padding:0; width:100%; height:100%; background:#000; overflow:hidden;
        display:flex; align-items:center; justify-content:center; }
      #GameDiv { position:relative; overflow:hidden; }
      #Cocos3dGameContainer, #GameCanvas { width:100%; height:100%; }
      #LoadingScreen {
        position:fixed; inset:0; z-index:9999; background:#04080f;
        display:flex; flex-direction:column; align-items:center; justify-content:center;
        transition:opacity 0.5s ease;
      }
      #LoadingScreen.fade-out { opacity:0; pointer-events:none; }
      #LoadingBolt { font-size:clamp(48px,14vw,80px); margin-bottom:16px;
        animation:bolt-pulse 1.2s ease-in-out infinite; }
      @keyframes bolt-pulse {
        0%,100%{opacity:1;transform:scale(1);text-shadow:0 0 30px #ffcc00;}
        50%{opacity:.7;transform:scale(.9);text-shadow:0 0 60px #ff8800;}
      }
      #LoadingTitle { font-family:Arial,sans-serif; font-size:clamp(22px,6vw,36px);
        font-weight:bold; color:#ffe066; letter-spacing:2px; margin-bottom:8px;
        text-shadow:0 0 20px #ffaa00; }
      #LoadingSubtitle { font-family:Arial,sans-serif; font-size:clamp(12px,3vw,16px);
        color:#88aacc; margin-bottom:40px; }
      #LoadingBarWrap { width:min(320px,70vw); height:8px; background:#1a1a3a;
        border-radius:4px; overflow:hidden; border:1px solid #2a2a5a; }
      #LoadingBar { height:100%; width:0%; background:linear-gradient(90deg,#3a88ff,#00cfff);
        border-radius:4px; transition:width 0.3s ease; }
      #LoadingPct { font-family:Arial,sans-serif; font-size:13px; color:#557799; margin-top:10px; }
    </style>
  </head>
  <body>
    <div id="LoadingScreen">
      <div id="LoadingBolt">⚡</div>
      <div id="LoadingTitle">THUNDER BLESSING</div>
      <div id="LoadingSubtitle">Zeus Slot Game</div>
      <div id="LoadingBarWrap"><div id="LoadingBar"></div></div>
      <div id="LoadingPct">載入中…</div>
    </div>
    <div id="GameDiv" cc_exact_fit_screen="false" style="width: 720px; height: 1280px;">
      <div id="Cocos3dGameContainer">
        <canvas id="GameCanvas" width="720" height="1280" tabindex="99"></canvas>
      </div>
    </div>
    <script>
    (function(){
      var DW=720,DH=1280;
      function scale(){
        var vw=window.innerWidth,vh=window.innerHeight;
        var s=Math.min(vw/DW,vh/DH);
        var d=document.getElementById('GameDiv');
        if(d) d.style.cssText='width:'+Math.floor(DW*s)+'px;height:'+Math.floor(DH*s)+'px;position:relative;margin:auto;overflow:hidden;';
      }
      window.addEventListener('resize',scale);
      window.addEventListener('orientationchange',function(){setTimeout(scale,200);});
      window.addEventListener('load',function(){setTimeout(scale,300);});
      scale();

      var bar=document.getElementById('LoadingBar');
      var pct=document.getElementById('LoadingPct');
      var ls=document.getElementById('LoadingScreen');
      var fakeP=0;
      var fakeT=setInterval(function(){
        fakeP=Math.min(fakeP+(Math.random()*0.04),0.6);
        if(bar) bar.style.width=Math.round(fakeP*100)+'%';
      },200);
      var t0=Date.now();
      var poll=setInterval(function(){
        try{
          var eng=window.cc&&window.cc.director;
          var scn=eng&&window.cc.director.getScene()&&window.cc.director.getScene().getChildByName('Canvas');
          var spDone=true;
          try{var sp=window.cc.internal.SplashScreen._ins||window.cc.internal.SplashScreen.instance;if(sp&&!sp._isFinished)spDone=false;}catch(x){}
          var ok=(scn&&spDone)||(Date.now()-t0>20000);
          if(ok){
            clearInterval(fakeT);clearInterval(poll);
            if(bar) bar.style.width='100%';
            if(pct) pct.textContent='100%';
            setTimeout(function(){
              if(ls){ls.classList.add('fade-out');setTimeout(function(){ls.style.display='none';},550);}
            },200);
          }
        }catch(e){}
      },100);
    })();
    </script>
    <!-- Polyfills bundle. -->

<script src="src/polyfills.bundle.js" charset="utf-8"> </script>    


<!-- SystemJS support. -->
<script src="src/system.bundle.js" charset="utf-8"> </script>

<!-- Import map -->
<script src="src/import-map.json" type="systemjs-importmap" charset="utf-8"> </script>

<script>
    System.import('./index.js').catch(function(err) { console.error(err); })
</script>
  </body>
</html>
